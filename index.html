<!DOCTYPE html>
<html>
<head>
<title>Ragul Balaji.</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>
<link href='https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.2/css/materialize.min.css' rel='stylesheet' type='text/css'>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.0.0-alpha1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/1.1.1/typed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.2/js/materialize.min.js"></script>
<style type="text/css">
html{
	background:url('MeSerious.jpg') no-repeat center center;
	min-height:100%;
	background-size:cover;
}

body{
	min-height:100%;
}

.typing{
	font-family: 'Roboto', sans-serif;
	font-size: 5vw;
	color:white;
	text-shadow: 2px 2px #E91E63;
	display: inline;
}
.typed-cursor{
    opacity: 1;
    font-family: 'Roboto', sans-serif;
    font-size: 5vw;
    color:white;
    text-shadow: 2px 2px #E91E63;
    -webkit-animation: blink 0.7s infinite;
    -moz-animation: blink 0.7s infinite;
    -ms-animation: blink 0.7s infinite;
    -o-animation: blink 0.7s infinite;
    animation: blink 0.7s infinite;
}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
#holder{
	position:absolute;
	top:27vh;
	left:60vw;
}
</style>
</head>
<body>
<div id="holder"><div class="typing" style="white-space:pre"></div><br>
<a id="websitebtn" class="waves-effect waves-light btn-large" style="display:none;" href="http://ragulbalaji.tk/"><i class="material-icons left">web</i>Website</a></div>
</body>
<script>
  $(function(){
      $(".typing").typed({
        strings: ["Hi! I'm Ragul\n^1000I love <code>^1000\nand robots.^1000"],
        startDelay: 1000,
        contentType: 'text',
        typeSpeed: 30,
        backDelay: 500,
        callback: function() {
        	document.getElementById("websitebtn").style.display="";
        },
      });
  });
</script>

  (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){

  })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

  ga('create', 'UA-9316500-9', 'auto');
  ga('send', 'pageview');

</script>
</html>
